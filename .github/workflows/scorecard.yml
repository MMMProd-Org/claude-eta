name: OpenSSF Scorecard

on:
  # Scorecard needs to run after CodeQL so its SAST check sees the
  # completed CodeQL analysis before uploading SARIF to code scanning.
  workflow_run:
    workflows: ["CodeQL"]
    types: [completed]
    branches: [main]
  schedule:
    - cron: "21 3 * * 1"
  workflow_dispatch: {}

permissions: read-all

jobs:
  analysis:
    name: Scorecard Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read

    steps:
      # Keep the default-branch checkout. Explicit workflow_run head SHA
      # checkouts are reported by Scorecard as Dangerous-Workflow findings.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      # CodeQL uploads the real SAST results. Scorecard's SAST meta-check is
      # noisy for multi-commit pushes because checks attach to the head commit.
      - name: Drop Scorecard SAST meta-alert
        run: node .github/scripts/filter-scorecard-sarif.mjs results.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        with:
          sarif_file: results.sarif
